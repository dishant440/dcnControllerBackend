version: '3.8'

services:
  db:
    image: mongo:7.0
    container_name: siren-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - siren-network

  redis:
    image: redis:7.0-alpine
    container_name: siren-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - siren-network

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siren-server
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "5443:5443"
    environment:
      - PORT=5000
      - HTTPS_PORT=5443
      - MONGO_URI=mongodb://db:27017/siren_db
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    volumes:
      - /home/khadas:/home/khadas:ro
    depends_on:
      - db
      - redis
    networks:
      - siren-network

  mdns:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siren-mdns
    restart: unless-stopped
    command: ["npm", "run", "start:mdns"]
    network_mode: host  # Required for mDNS multicast traffic
    environment:
      - MONGO_URI=mongodb://localhost:27017/siren_db # Must connect via localhost since host mode is used
    depends_on:
      - db
      
volumes:
  mongodb_data:

networks:
  siren-network:
    driver: bridge