version: '3.8'

services:
  db:
    image: mongo:7.0
    container_name: siren-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - siren-network

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siren-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://db:27017/siren_db
      - NODE_ENV=production
    depends_on:
      - db
    networks:
      - siren-network

volumes:
  mongodb_data:

networks:
  siren-network:
    driver: bridge